<html>
<head>
    <title>QMD Memory System</title>
</head>

<body>
    <div x-data>
        <template x-if="config">
            <div>
                <div class="section-title">QMD Memory System</div>
                <div class="section-description">
                    Session-based memory with hybrid search (BM25 + semantic). At the end of each conversation a summary is saved automatically and recalled in future conversations.
                </div>

                <!-- ── Memory Recall ──────────────────────────────────────── -->
                <div class="section-title">Memory Recall</div>
                <div class="section-description">
                    Controls automatic recall — how often past sessions are searched and injected into the agent's context during a conversation.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Enable automatic recall</div>
                        <div class="field-description">
                            Search past session summaries and inject relevant context every N iterations.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.memory_recall_enabled" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Recall interval (iterations)</div>
                        <div class="field-description">
                            Run a session search every N agent iterations. Lower = more frequent recall.
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="1" max="20" x-model.number="config.memory_recall_interval" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Max results per recall</div>
                        <div class="field-description">
                            Maximum number of session snippets injected per recall cycle.
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="1" max="20" x-model.number="config.memory_recall_max_results" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Token budget for recalled sessions</div>
                        <div class="field-description">
                            Recalled session summaries are truncated to stay within this token limit.
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="500" max="10000" step="100" x-model.number="config.memory_recall_token_budget" />
                    </div>
                </div>

                <!-- ── Session Extraction ─────────────────────────────────── -->
                <div class="section-title">Session Extraction</div>
                <div class="section-description">
                    Controls when session summaries are created at the end of each conversation.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Enable automatic session saving</div>
                        <div class="field-description">
                            At the end of each conversation, use a utility LLM to write a session summary.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.memory_extract_enabled" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Min user message length to trigger saving</div>
                        <div class="field-description">
                            Skip session saving for very short conversations. Based on total user-message characters.
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="0" max="2000" step="50" x-model.number="config.memory_extract_min_chars" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Min tool calls to trigger saving</div>
                        <div class="field-description">
                            Also save a session if the agent made at least this many tool calls, even if the conversation was short.
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="0" max="20" x-model.number="config.memory_extract_min_tool_calls" />
                    </div>
                </div>

                <!-- ── Search ─────────────────────────────────────────────── -->
                <div class="section-title">Search</div>
                <div class="section-description">
                    Settings for the <code>memory_search</code> tool and QMD search engine.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Normalize search queries via LLM</div>
                        <div class="field-description">
                            Before sending a <code>memory_search</code> query to QMD, strip noise words using a utility LLM. Fixes poor results from long natural-language queries.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.memory_search_query_prep" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Temporal decay half-life (days)</div>
                        <div class="field-description">
                            Recent sessions rank higher. 30 days = a session from 30 days ago scores at half of a fresh one.
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="1" max="365" x-model.number="config.memory_temporal_decay_halflife_days" />
                    </div>
                </div>

                <!-- ── Storage ────────────────────────────────────────────── -->
                <div class="section-title">Storage</div>
                <div class="section-description">
                    File storage settings for session files.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Memory directory</div>
                        <div class="field-description">
                            Absolute path where session markdown files are stored (e.g. <code>/a0/usr/memory/1774702399.md</code>).
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="text"
                               x-model="config.memory_dir"
                               placeholder="/a0/usr/memory" />
                    </div>
                </div>

            </div>
        </template>
    </div>
</body>

</html>
